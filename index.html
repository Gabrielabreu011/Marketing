<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rastreador de Posts de Influencers</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <h1>Rastreador de Influ</h1>
  </div>
  <div class="badge">📊 Controle de Campanhas</div>
</div>

<div class="container">
  <div class="layout">

    <!-- Painel esquerdo: Configuração + Adicionar Post -->
    <div>
      <div class="panel" style="margin-bottom:20px">
        <div class="panel-title">⚙ Configuração da Marca</div>

        <div class="form-group">
          <label>Seu @ (sem o @)</label>
          <input type="text" id="brand-handle" placeholder="suamarca" />
          <p class="config-hint">Posts com @suamarca serão marcados como menção.</p>
        </div>

        <div class="form-group">
          <label>Hashtags monitoradas</label>
          <div class="tags-input" id="tags-container" onclick="document.getElementById('tag-input-inner').focus()">
            <input class="tag-input-inner" id="tag-input-inner" placeholder="Digite e pressione Enter" />
          </div>
          <p class="config-hint">Ex: #campanhaverão, #parceria</p>
        </div>

        <button class="btn btn-ghost btn-sm" onclick="saveConfig()" style="width:100%">💾 Salvar configuração</button>
      </div>

      <div class="panel">
        <div class="panel-title">➕ Adicionar Post</div>

        <div class="form-group">
          <label>@ do Influencer (sem o @)</label>
          <input type="text" id="influ-handle" placeholder="nomeinfluencer" />
        </div>

        <div class="form-group">
          <label>Tipo de marcação</label>
          <select id="post-type">
            <option value="mention">Menção (@)</option>
            <option value="hashtag">Hashtag (#)</option>
            <option value="both">Ambos</option>
          </select>
        </div>

        <div class="form-group" id="hashtag-select-wrap">
          <label>Qual hashtag?</label>
          <select id="post-hashtag"><option value="">— selecione —</option></select>
        </div>

        <div class="form-group">
          <label>Data do post</label>
          <input type="date" id="post-date" />
        </div>

        <div class="form-group">
          <label>Link do post (opcional)</label>
          <input type="url" id="post-url" placeholder="https://www.instagram.com/p/..." />
        </div>

        <div class="form-group">
          <label>Nota (opcional)</label>
          <input type="text" id="post-note" placeholder="Ex: Stories, Reel, Feed..." />
        </div>

        <button class="btn btn-primary" onclick="addPost()">Registrar post</button>
      </div>
    </div>

    <!-- Painel direito: Dashboard -->
    <div>
      <div class="stat-grid">
        <div class="stat"><div class="stat-val" id="s-total">0</div><div class="stat-label">Total de posts</div></div>
        <div class="stat"><div class="stat-val" id="s-influ">0</div><div class="stat-label">Influencers</div></div>
        <div class="stat"><div class="stat-val" id="s-today">0</div><div class="stat-label">Este mês</div></div>
      </div>

      <div class="panel">
        <div class="section-header">
          <h2>Influencers</h2>
          <span id="filter-count" style="font-size:12px;color:var(--muted)"></span>
        </div>
        <input class="search-bar" id="search" placeholder="🔍 Buscar influencer..." oninput="render()" />
        <div id="influ-list"></div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
